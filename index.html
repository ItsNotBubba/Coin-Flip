<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CoinFlip Pro</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #0b1220, #000);
  color: white;
  overflow: hidden;
}

/* top bar */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-weight: 700;
  letter-spacing: 1px;
}

.btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: #2563eb;
  font-size: 13px;
  cursor: pointer;
}

/* center layout */
.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* card */
.card {
  text-align: center;
  padding: 40px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}

/* coin */
.coin {
  width: 170px;
  height: 170px;
  margin: 20px auto;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.5s cubic-bezier(.2,.8,.2,1);
  cursor: pointer;
}

/* glow ring */
.coin::before {
  content: "";
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.4), transparent 60%);
  filter: blur(10px);
}

/* faces */
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  backface-visibility: hidden;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 26px;
  font-weight: 800;

  box-shadow:
    inset 0 10px 20px rgba(255,255,255,0.25),
    inset 0 -10px 20px rgba(0,0,0,0.6),
    0 20px 40px rgba(0,0,0,0.7);

  transition: transform 0.2s;
}

/* heads */
.heads {
  background: radial-gradient(circle at 30% 30%, #fcd34d, #92400e);
}

/* tails */
.tails {
  background: radial-gradient(circle at 30% 30%, #93c5fd, #1e3a8a);
  transform: rotateY(180deg);
}

/* result */
#result {
  margin-top: 15px;
  opacity: 0.85;
  font-size: 16px;
}

/* hint */
.hint {
  font-size: 12px;
  opacity: 0.5;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">CoinFlipper</div>
  <div class="btn">Dashboard</div>
</div>

<div class="container">
  <div class="card">

    <h2>Coin Flip</h2>
    <p style="opacity:0.6">Click anywhere on the coin</p>

    <div class="coin" id="coin">
      <div class="face heads">HEADS</div>
      <div class="face tails">TAILS</div>
    </div>


  </div>
</div>

<script>
let rotation = 0;

coin.addEventListener("click", (e) => {
  const rect = coin.getBoundingClientRect();
  const clickX = e.clientX - rect.left;

  const isLeft = clickX < rect.width / 2;

  rotation += 1440;

  if (isLeft) {
    coin.style.transform = `rotateY(${rotation}deg)`;
    setTimeout(() => result.textContent = "HEADS", 1400);
  } else {
    coin.style.transform = `rotateY(${rotation + 180}deg)`;
    setTimeout(() => result.textContent = "TAILS", 1400);
  }
});
</script>

</body>
</html>
